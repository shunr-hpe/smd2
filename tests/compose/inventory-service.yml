services:
###
# Inventory Containers
###
  inventory-service:
    image: ${INVENTORY_SERVICE_IMAGE}
    container_name: inventory-service
    hostname: inventory
    environment:
      # these environment variables are not currently used,
      # but may be needed once inventory-service is switched to use postgres
      - SMD_DBHOST=postgres
      - SMD_DBPORT=5432
      - SMD_DBNAME=inventoryds
      - SMD_DBUSER=inventory-user
      - SMD_DBPASS=${SMD2_POSTGRES_PASSWORD} # Set in .env file
      - SMD_DBOPTS=sslmode=disable
      - SMD_JWKS_URL=
    networks:
      - internal

